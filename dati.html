<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dati UCC</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            color: #333;
        }

        header {
            background: #0066cc;
            color: white;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        header h1 { font-size: 1.1rem; font-weight: bold; }
        header p  { font-size: 0.85rem; opacity: 0.85; }
        .back-link {
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            opacity: 0.85;
            margin-left: auto;
            white-space: nowrap;
        }
        .back-link:hover { opacity: 1; }

        main {
            max-width: 960px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .control-group label {
            font-size: 0.8rem;
            font-weight: bold;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .control-group input[type="date"] {
            padding: 7px 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.9rem;
            background: white;
        }

        .sensor-toggles { display: flex; flex-wrap: wrap; gap: 6px; }
        .step-toggles { display: flex; gap: 0; }
        .step-btn {
            padding: 6px 10px;
            border: 1px solid #ccc;
            background: white;
            color: #555;
            cursor: pointer;
            font-size: 0.82rem;
            margin: 0;
        }
        .step-btn:first-child { border-radius: 5px 0 0 5px; }
        .step-btn:last-child  { border-radius: 0 5px 5px 0; }
        .step-btn + .step-btn { border-left: none; }
        .step-btn.active { background: #0066cc; color: white; border-color: #0066cc; }
        .sensor-btn {
            padding: 6px 13px;
            border: 2px solid var(--sc);
            border-radius: 20px;
            background: white;
            color: var(--sc);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: bold;
            transition: background 0.15s, color 0.15s;
        }
        .sensor-btn.active {
            background: var(--sc);
            color: white;
        }

        .btn {
            padding: 8px 18px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .btn:hover { background: #0055aa; }
        .btn-secondary { background: #5a8a5a; }
        .btn-secondary:hover { background: #477047; }

        .stats-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .stat-box {
            flex: 1;
            min-width: 120px;
            background: #f0f6ff;
            border: 1px solid #c8ddf5;
            border-radius: 6px;
            padding: 10px 14px;
            text-align: center;
        }
        .stat-box .val {
            font-size: 1.4rem;
            font-weight: bold;
            color: #0066cc;
        }
        .stat-box .lbl {
            font-size: 0.75rem;
            color: #666;
            margin-top: 2px;
        }

        .chart-container {
            position: relative;
            height: 340px;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 12px;
        }

        .toggle-table {
            font-size: 0.85rem;
            color: #0066cc;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            margin-bottom: 10px;
            text-decoration: underline;
        }

        .table-wrap {
            overflow-x: auto;
            max-height: 320px;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }
        th {
            background: #0066cc;
            color: white;
            padding: 7px 10px;
            text-align: left;
            position: sticky;
            top: 0;
        }
        td {
            padding: 6px 10px;
            border-bottom: 1px solid #eee;
        }
        tr:nth-child(even) td { background: #f7faff; }

        #msg {
            text-align: center;
            color: #888;
            padding: 40px;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .chart-container { height: 260px; }
            header { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1 id="header-title">Dati stazione UCC</h1>
        <p id="header-sub">Underground Climate Change</p>
    </div>
    <a class="back-link" href="mappa_ucc.html">← Mappa stazioni</a>
</header>

<main>
    <div id="msg">Caricamento dati...</div>

    <div id="content" style="display:none">

        <!-- Controlli -->
        <div class="card">
            <div class="controls">
                <div class="control-group">
                    <label>Sensori</label>
                    <div id="sensor-toggles" class="sensor-toggles"></div>
                </div>
                <div class="control-group">
                    <label>Dal</label>
                    <input type="date" id="date-from">
                </div>
                <div class="control-group">
                    <label>Al</label>
                    <input type="date" id="date-to">
                </div>
                <div class="control-group">
                    <label>Passo asse X</label>
                    <div class="step-toggles">
                        <button class="step-btn" data-step="auto">Auto</button>
                        <button class="step-btn" data-step="week">Sett.</button>
                        <button class="step-btn active" data-step="month">Mens.</button>
                        <button class="step-btn" data-step="quarter">Trim.</button>
                    </div>
                </div>
                <button class="btn" onclick="updateChart()">Aggiorna</button>
                <button class="btn btn-secondary" onclick="downloadCSV()">⬇ Scarica CSV</button>
            </div>
        </div>

        <!-- Statistiche -->
        <div class="card">
            <div class="section-title">Statistiche periodo selezionato</div>
            <div id="stats-row" class="stats-row"></div>
        </div>

        <!-- Grafico -->
        <div class="card">
            <div class="section-title">Andamento temperatura giornaliera</div>
            <div class="chart-container">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <!-- Tabella -->
        <div class="card">
            <button class="toggle-table" onclick="toggleTable()">▶ Mostra dati tabellari</button>
            <div id="table-wrap" class="table-wrap" style="display:none">
                <table>
                    <thead id="table-head"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>

    </div>
</main>

<script>
let allData = [];
let meta = {};
let chart = null;

const SENSOR_COLORS = {
    air1:  '0,102,204',
    air2:  '120,0,180',
    ext:   '200,100,0',
    rock:  '140,80,30',
    water: '0,130,130',
};

const stationKey = new URLSearchParams(window.location.search).get('station') || 'fvg01';

const MESI = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];

function getStep() {
    const btn = document.querySelector('.step-btn.active');
    return btn ? btn.dataset.step : 'month';
}

function tickFilter(dateStr) {
    const step = getStep();
    const [y, m, d] = dateStr.split('-').map(Number);
    if (step === 'auto')    return true;
    if (step === 'week')    return new Date(y, m - 1, d).getDay() === 1; // lunedì
    if (step === 'month')   return d === 1;
    if (step === 'quarter') return d === 1 && (m === 1 || m === 4 || m === 7 || m === 10);
    return true;
}

function tickLabel(dateStr) {
    const step = getStep();
    const [y, m, d] = dateStr.split('-').map(Number);
    const mes = MESI[m - 1];
    if (step === 'week')  return `${d} ${mes}`;
    if (step === 'auto')  return `${d} ${mes}`;
    return `${mes} '${String(y).slice(2)}`;
}

function getActiveSensors() {
    return [...document.querySelectorAll('.sensor-btn.active')].map(b => b.dataset.sensor);
}

function colorOf(key) {
    return SENSOR_COLORS[key] || '100,100,100';
}

async function loadData() {
    try {
        const metaResp = await fetch(`data/${stationKey}_meta.json`);
        if (!metaResp.ok) throw new Error(`Meta non trovato: data/${stationKey}_meta.json`);
        meta = await metaResp.json();

        document.getElementById('header-title').textContent = meta.name;
        document.getElementById('header-sub').textContent = `Stazione UCC ${meta.station_id} — Underground Climate Change`;
        document.title = `Dati ${meta.station_id} — UCC`;

        document.querySelectorAll('.step-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.step-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateChart();
            });
        });

        const container = document.getElementById('sensor-toggles');
        let first = true;
        for (const [key, label] of Object.entries(meta.sensors)) {
            const btn = document.createElement('button');
            btn.className = 'sensor-btn' + (first ? ' active' : '');
            btn.dataset.sensor = key;
            btn.style.setProperty('--sc', `rgb(${colorOf(key)})`);
            btn.textContent = label;
            btn.addEventListener('click', () => { btn.classList.toggle('active'); updateChart(); });
            container.appendChild(btn);
            first = false;
        }

        document.getElementById('date-from').value = meta.date_min;
        document.getElementById('date-to').value   = meta.date_max;

        const csvResp = await fetch(`data/${stationKey}.csv`);
        if (!csvResp.ok) throw new Error(`CSV non trovato: data/${stationKey}.csv`);
        const parsed = Papa.parse(await csvResp.text(), { header: true, dynamicTyping: true, skipEmptyLines: true });
        allData = parsed.data;

        document.getElementById('msg').style.display = 'none';
        document.getElementById('content').style.display = 'block';

        updateChart();
    } catch (e) {
        document.getElementById('msg').textContent = 'Errore: ' + e.message;
    }
}

function filterData() {
    const from = document.getElementById('date-from').value;
    const to   = document.getElementById('date-to').value;
    return allData.filter(r => r.date >= from && r.date <= to);
}

function updateChart() {
    const active = getActiveSensors();
    const rows   = filterData();
    const labels = rows.map(r => r.date);
    const single = active.length === 1;

    // Stats
    const statsEl = document.getElementById('stats-row');
    if (active.length === 0) {
        statsEl.innerHTML = '<div class="stat-box"><div class="val" style="font-size:1rem">—</div><div class="lbl">Nessun sensore selezionato</div></div>';
    } else if (single) {
        const s = active[0];
        const means = rows.map(r => r[`${s}_mean`]).filter(v => v != null);
        const maxs  = rows.map(r => r[`${s}_max`]).filter(v => v != null);
        const mins  = rows.map(r => r[`${s}_min`]).filter(v => v != null);
        statsEl.innerHTML =
            `<div class="stat-box"><div class="val">${means.length ? (means.reduce((a,b)=>a+b)/means.length).toFixed(2) : '—'}</div><div class="lbl">Media (°C)</div></div>` +
            `<div class="stat-box"><div class="val">${maxs.length  ? Math.max(...maxs).toFixed(2)  : '—'}</div><div class="lbl">Massima (°C)</div></div>` +
            `<div class="stat-box"><div class="val">${mins.length  ? Math.min(...mins).toFixed(2)  : '—'}</div><div class="lbl">Minima (°C)</div></div>` +
            `<div class="stat-box"><div class="val">${rows.length}</div><div class="lbl">Giorni</div></div>`;
    } else {
        let html = `<div class="stat-box"><div class="val">${rows.length}</div><div class="lbl">Giorni</div></div>`;
        for (const s of active) {
            const means = rows.map(r => r[`${s}_mean`]).filter(v => v != null);
            const maxs  = rows.map(r => r[`${s}_max`]).filter(v => v != null);
            const mins  = rows.map(r => r[`${s}_min`]).filter(v => v != null);
            html += `<div class="stat-box" style="border-color:rgb(${colorOf(s)});min-width:150px">` +
                `<div class="lbl" style="color:rgb(${colorOf(s)})">${meta.sensors[s]}</div>` +
                `<div class="val" style="font-size:1.1rem">${means.length ? (means.reduce((a,b)=>a+b)/means.length).toFixed(2) : '—'} °C</div>` +
                `<div class="lbl">max ${maxs.length ? Math.max(...maxs).toFixed(2) : '—'} · min ${mins.length ? Math.min(...mins).toFixed(2) : '—'}</div>` +
                `</div>`;
        }
        statsEl.innerHTML = html;
    }

    // Datasets
    const datasets = [];
    if (single) {
        const s = active[0];
        const c = colorOf(s);
        datasets.push({
            label: 'Max', data: rows.map(r => r[`${s}_max`]),
            borderColor: `rgba(${c},0.25)`, borderWidth: 1, borderDash: [4, 3],
            pointRadius: 0, fill: 1, backgroundColor: `rgba(${c},0.10)`, order: 3,
        });
        datasets.push({
            label: 'Min', data: rows.map(r => r[`${s}_min`]),
            borderColor: `rgba(${c},0.25)`, borderWidth: 1, borderDash: [4, 3],
            pointRadius: 0, fill: false, order: 3,
        });
        datasets.push({
            label: meta.sensors[s], data: rows.map(r => r[`${s}_mean`]),
            borderColor: `rgba(${c},1)`, borderWidth: 2,
            pointRadius: 0, fill: false, order: 1, tension: 0.3,
        });
    } else {
        for (const s of active) {
            const c = colorOf(s);
            datasets.push({
                label: meta.sensors[s], data: rows.map(r => r[`${s}_mean`]),
                borderColor: `rgba(${c},1)`, borderWidth: 2,
                pointRadius: 0, fill: false, order: 1, tension: 0.3,
            });
        }
    }

    if (chart) {
        chart.data.labels = labels;
        chart.data.datasets = datasets;
        chart.options.scales.x.ticks.callback = function(value) {
            const label = this.getLabelForValue(value);
            return tickFilter(label) ? tickLabel(label) : null;
        };
        chart.update();
    } else {
        chart = new Chart(document.getElementById('chart'), {
            type: 'line',
            data: { labels, datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: {
                        labels: { filter: item => item.text !== 'Max' && item.text !== 'Min' }
                    },
                    tooltip: {
                        callbacks: {
                            title: ctx => ctx[0].label,
                            label: ctx => {
                                const v = ctx.parsed.y;
                                if (v == null) return null;
                                return `${ctx.dataset.label}: ${v.toFixed(2)} °C`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            maxTicksLimit: 500,
                            maxRotation: 45,
                            minRotation: 45,
                            font: { size: 11 },
                            callback: function(value, index) {
                                const label = this.getLabelForValue(value);
                                return tickFilter(label) ? tickLabel(label) : null;
                            }
                        },
                        grid: { color: '#eee' }
                    },
                    y: {
                        title: { display: true, text: 'Temperatura (°C)', font: { size: 11 } },
                        grid: { color: '#eee' }, ticks: { font: { size: 11 } },
                    }
                }
            }
        });
    }

    if (document.getElementById('table-wrap').style.display !== 'none') {
        renderTable(rows, active);
    }
}

function renderTable(rows, active) {
    const thead = document.getElementById('table-head');
    const tbody = document.getElementById('table-body');
    thead.innerHTML = '<tr><th>Data</th>' +
        active.map(s => `<th>${meta.sensors[s]} media (°C)</th><th>max (°C)</th><th>min (°C)</th>`).join('') +
        '</tr>';
    tbody.innerHTML = rows.map(r =>
        '<tr><td>' + r.date + '</td>' +
        active.map(s =>
            `<td>${r[`${s}_mean`] ?? '—'}</td><td>${r[`${s}_max`] ?? '—'}</td><td>${r[`${s}_min`] ?? '—'}</td>`
        ).join('') +
        '</tr>'
    ).join('');
}

function toggleTable() {
    const wrap = document.getElementById('table-wrap');
    const btn  = document.querySelector('.toggle-table');
    const visible = wrap.style.display !== 'none';
    wrap.style.display = visible ? 'none' : 'block';
    btn.textContent = (visible ? '▶' : '▼') + ' ' + (visible ? 'Mostra' : 'Nascondi') + ' dati tabellari';
    if (!visible) renderTable(filterData(), getActiveSensors());
}

function downloadCSV() {
    const active = getActiveSensors();
    const rows   = filterData();
    const from   = document.getElementById('date-from').value;
    const to     = document.getElementById('date-to').value;
    const lines  = [
        `# Stazione: ${meta.name} (${meta.station_id})`,
        `# Sensori: ${active.map(s => meta.sensors[s]).join(', ')}`,
        `# Periodo: ${from} / ${to}`,
        ['Data', ...active.flatMap(s => [`${meta.sensors[s]} media (°C)`, 'max (°C)', 'min (°C)'])].join(','),
        ...rows.map(r =>
            [r.date, ...active.flatMap(s => [r[`${s}_mean`] ?? '', r[`${s}_max`] ?? '', r[`${s}_min`] ?? ''])].join(',')
        )
    ];
    const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `UCC_${meta.station_id}_${active.join('-')}_${from}_${to}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

loadData();
</script>
</body>
</html>
